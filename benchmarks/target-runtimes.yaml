schemaVersion: 1
runtimes:
  - id: codex
    runtime:
      schemaVersion: 1
      execution: docker
      harness: codex
      image: redactbench/harness-codex:0.144.1
      argv: [redactbench-harness, --harness, codex, --model, "{model}", "{modelArguments}", --workspace, "{workspace}"]
      promptTransport: stdin
      network: redactbench-egress-openai
      credentialMounts:
        - sourceEnv: REDACTBENCH_CODEX_PROFILE
          target: /auth/codex
      timeoutMs: 3600000
  - id: grok-build
    runtime:
      schemaVersion: 1
      execution: docker
      harness: grok-build
      image: redactbench/harness-grok:0.2.93
      argv: [redactbench-harness, --harness, grok-build, --model, "{model}", "{modelArguments}", --workspace, "{workspace}", --prompt-file, "{promptFile}"]
      promptTransport: file
      network: redactbench-egress-xai
      credentialMounts:
        - sourceEnv: REDACTBENCH_GROK_PROFILE
          target: /auth/grok
      timeoutMs: 3600000
  - id: cursor
    runtime:
      schemaVersion: 1
      execution: docker
      harness: cursor
      image: redactbench/harness-cursor:2026.07.09-a3815c0
      argv: [redactbench-harness, --harness, cursor, --model, "{model}", "{modelArguments}", --workspace, "{workspace}", --prompt-file, "{promptFile}"]
      promptTransport: file
      network: redactbench-egress-cursor
      credentialMounts:
        - sourceEnv: REDACTBENCH_CURSOR_PROFILE
          target: /auth/cursor
      timeoutMs: 3600000
  - id: agy
    runtime:
      schemaVersion: 1
      execution: docker
      harness: agy
      image: redactbench/harness-agy:1.1.1
      argv: [redactbench-harness, --harness, agy, --model, "{model}", "{modelArguments}", --workspace, "{workspace}", --prompt-file, "{promptFile}"]
      promptTransport: file
      network: redactbench-egress-google
      credentialMounts:
        - sourceEnv: REDACTBENCH_AGY_PROFILE
          target: /auth/agy
      timeoutMs: 3600000
  - id: opencode-zai
    runtime:
      schemaVersion: 1
      execution: docker
      harness: opencode
      image: redactbench/harness-opencode:1.17.13
      argv: [redactbench-harness, --harness, opencode, --model, "{model}", "{modelArguments}", --workspace, "{workspace}", --prompt-file, "{promptFile}"]
      promptTransport: file
      network: redactbench-egress-zai
      credentialSecrets:
        - sourceEnv: REDACTBENCH_ZAI_KEY_FILE
          target: /run/secrets/zai-api-key
      timeoutMs: 3600000
  - id: opencode-openrouter
    runtime:
      schemaVersion: 1
      execution: docker
      harness: opencode
      image: redactbench/harness-opencode:1.17.13
      argv: [redactbench-harness, --harness, opencode, --model, "{model}", "{modelArguments}", --workspace, "{workspace}", --prompt-file, "{promptFile}"]
      promptTransport: file
      network: redactbench-egress-openrouter
      credentialSecrets:
        - sourceEnv: REDACTBENCH_OPENROUTER_KEY_FILE
          target: /run/secrets/openrouter-api-key
      timeoutMs: 3600000
bindings:
  - entrantId: gpt-5-6-sol-max-codex
    runtimeId: codex
    model: gpt-5.6-sol
    modelArguments: [-c, 'model_reasoning_effort="max"']
  - entrantId: gpt-5-6-terra-max-codex
    runtimeId: codex
    model: gpt-5.6-terra
    modelArguments: [-c, 'model_reasoning_effort="max"']
  - entrantId: gpt-5-6-luna-max-codex
    runtimeId: codex
    model: gpt-5.6-luna
    modelArguments: [-c, 'model_reasoning_effort="max"']
  - entrantId: gpt-5-5-xhigh-codex
    runtimeId: codex
    model: gpt-5.5
    modelArguments: [-c, 'model_reasoning_effort="xhigh"']
  - entrantId: grok-4-5-high-grok-build
    runtimeId: grok-build
    model: grok-4.5
    modelArguments: [--reasoning-effort, high]
  - entrantId: grok-build-grok-build
    runtimeId: grok-build
    model: grok-composer-2.5-fast
  - entrantId: cursor-composer-2-5-cursor
    runtimeId: cursor
    model: composer-2.5
  - entrantId: gemini-3-5-flash-high-agy
    runtimeId: agy
    model: Gemini 3.5 Flash (High)
  - entrantId: gemini-3-1-pro-high-agy
    runtimeId: agy
    model: Gemini 3.1 Pro (High)
  - entrantId: glm-5-2-max-opencode
    runtimeId: opencode-zai
    model: zai/glm-5.2
    modelArguments: [--variant, max]
  - entrantId: hy3-high-opencode
    runtimeId: opencode-openrouter
    model: openrouter/tencent/hy3
    modelArguments: [--variant, high]
