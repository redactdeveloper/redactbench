schemaVersion: 1
runtimes:
  - id: agy
    runtime:
      schemaVersion: 1
      execution: docker
      harness: agy
      image: redactbench/harness-agy:1.1.1-rb0.3.0.2
      argv: [redactbench-harness, --harness, agy, --model, "{model}", "{modelArguments}", --workspace, "{workspace}", --prompt-file, "{promptFile}"]
      promptTransport: file
      network: redactbench-egress-google
      credentialMounts:
        - sourceEnv: REDACTBENCH_AGY_PROFILE
          target: /auth/agy
      timeoutMs: 3600000
bindings:
  - entrantId: gemini-3-5-flash-high-agy
    runtimeId: agy
    model: Gemini 3.5 Flash (High)
    modelArguments: [--new-project]
  - entrantId: gemini-3-1-pro-high-agy
    runtimeId: agy
    model: Gemini 3.1 Pro (High)
    modelArguments: [--new-project]
