schemaVersion: 1
id: recover-port-utils
title: Recover and finish port utilities
category: context-recovery
description: Two related files must be repaired across a forced stateless context reset.
prompt: Make parsePort accept only decimal strings representing integer ports from 1 to 65535, and make formatPort return a colon-prefixed string for valid integer ports or null otherwise.
tags: [smoke, javascript, recovery]
contextRecovery:
  enabled: true
  phase1Prompt: Implement parsePort only. Do not edit formatPort yet. Leave exact notes about completed behavior and remaining work.
  phase2Prompt: Recover from the surviving repository, Git history, and notes. Preserve parsePort and finish formatPort.
  maxPhase1OutputTokens: 2048
  notesRequired: true
checks:
  - id: parse-valid
    label: Parses valid ports
    image: node:22-alpine
    argv: [node, /evaluator/check.mjs, parse-valid]
    weight: 1
  - id: parse-invalid
    label: Rejects malformed ports
    image: node:22-alpine
    argv: [node, /evaluator/check.mjs, parse-invalid]
    weight: 2
  - id: format-valid
    label: Formats valid ports
    image: node:22-alpine
    argv: [node, /evaluator/check.mjs, format-valid]
    weight: 1
  - id: format-invalid
    label: Rejects invalid formatting input
    image: node:22-alpine
    argv: [node, /evaluator/check.mjs, format-invalid]
    weight: 2
