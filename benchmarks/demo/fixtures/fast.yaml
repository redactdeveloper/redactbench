  "isolate-request-id-state:final":
    text: |
      <redactbench_patch>
      diff --git a/request-ids.mjs b/request-ids.mjs
      --- a/request-ids.mjs
      +++ b/request-ids.mjs
      @@ -1,5 +1,8 @@
      -let nextId = 0;
      -
      +const counters = new Map();
       export function createRequestIdGenerator(prefix) {
      -  return () => `${prefix}-${++nextId}`;
      +  return () => {
      +    const nextId = (counters.get(prefix) ?? 0) + 1;
      +    counters.set(prefix, nextId);
      +    return `${prefix}-${nextId}`;
      +  };
       }
      </redactbench_patch>
      <redactbench_notes>
      Tracks a counter per prefix in a shared map.
      </redactbench_notes>
