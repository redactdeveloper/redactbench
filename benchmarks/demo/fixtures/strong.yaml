  "accessible-disclosure:final":
    text: |
      <redactbench_patch>
      diff --git a/index.html b/index.html
      --- a/index.html
      +++ b/index.html
      @@ -8,8 +8,10 @@
      -    <div id="details-toggle" class="toggle">Show account details</div>
      -    <section id="details-panel">Two-factor authentication is enabled.</section>
      +    <button id="details-toggle" class="toggle" type="button" aria-expanded="false" aria-controls="details-panel">Show account details</button>
      +    <section id="details-panel" hidden>Two-factor authentication is enabled.</section>
           <script>
             const toggle = document.getElementById("details-toggle");
             const panel = document.getElementById("details-panel");
             toggle.addEventListener("click", () => {
      -        panel.hidden = !panel.hidden;
      +        const expanded = toggle.getAttribute("aria-expanded") !== "true";
      +        toggle.setAttribute("aria-expanded", String(expanded));
      +        panel.hidden = !expanded;
             });
      </redactbench_patch>
      <redactbench_notes>
      Uses native button semantics and keeps aria-expanded and hidden synchronized from one computed state.
      </redactbench_notes>
