  "debug-get-user:final":
    text: |
      <redactbench_patch>
      diff --git a/users.mjs b/users.mjs
      --- a/users.mjs
      +++ b/users.mjs
      @@ -1,3 +1,3 @@
       export function getUser(users, id) {
      -  return users[id];
      +  return users.find((user) => user.id === id);
       }
      </redactbench_patch>
      <redactbench_notes>
      Replaced index access with an ID lookup. Array.find naturally returns undefined for missing and empty inputs.
      </redactbench_notes>
