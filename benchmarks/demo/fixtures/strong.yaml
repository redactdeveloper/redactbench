  "recover-port-utils:phase1":
    text: |
      <redactbench_patch>
      diff --git a/src/parse-port.mjs b/src/parse-port.mjs
      --- a/src/parse-port.mjs
      +++ b/src/parse-port.mjs
      @@ -1,3 +1,5 @@
       export function parsePort(value) {
      -  return Number(value);
      +  if (typeof value !== "string" || !/^\d+$/.test(value)) return null;
      +  const port = Number(value);
      +  return Number.isInteger(port) && port >= 1 && port <= 65535 ? port : null;
       }
      </redactbench_patch>
      <redactbench_notes>
