  "top-k-frequent:final":
    text: |
      <redactbench_patch>
      diff --git a/top-k.mjs b/top-k.mjs
      --- a/top-k.mjs
      +++ b/top-k.mjs
      @@ -1,3 +1,11 @@
       export function topKFrequent(values, k) {
      -  return [...new Set(values)].slice(0, k);
      +  if (!Array.isArray(values) || !Number.isInteger(k) || k <= 0) return [];
      +  const counts = new Map();
      +  for (const value of values) {
      +    counts.set(value, (counts.get(value) ?? 0) + 1);
      +  }
      +  return [...counts.entries()]
      +    .sort((left, right) => right[1] - left[1] || left[0] - right[0])
      +    .slice(0, k)
      +    .map(([value]) => value);
       }
      </redactbench_patch>
      <redactbench_notes>
      Counts values once, applies an explicit numeric tie-break, validates k, and never sorts the caller's array.
      </redactbench_notes>
    inputTokens: 430
    outputTokens: 137
    ttftMs: 690
